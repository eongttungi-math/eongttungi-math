<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엉뚱이의 엉뚱한 문제풀이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gugi&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>

:root{
  --bg:#FFEAD4;
  --paper:#FFFFFF;
  --ink:#241B2E;
  --ink-soft:#7A6A5A;
  --fox:#FF6B35;
  --fox-deep:#E8491C;
  --fox-tint:rgba(255,107,53,0.10);
  --brand-blue:#00C2EE;
  --brand-blue-deep:#0099C2;
  --brand-pink:#F8708A;
  --brand-pink-deep:#E84F6B;
  --mint:#06B88A;
  --mint-tint:rgba(6,184,138,0.10);
  --sky:#00B4D8;
  --sky-tint:rgba(0,180,216,0.10);
  --sun:#FFC93C;
  --border:#F0E0CC;
  --ring:#E9D9C2;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{
  overscroll-behavior:none;
}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Pretendard',sans-serif;
  min-height:100vh; position:relative;
  overscroll-behavior:none;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(circle, rgba(0,194,238,0.12) 1.6px, transparent 1.6px),
    radial-gradient(circle, rgba(248,112,138,0.12) 1.6px, transparent 1.6px);
  background-size: 38px 38px, 38px 38px;
  background-position: 0 0, 19px 19px;
}
.hand{ font-family:'Gugi', sans-serif; font-weight:400; letter-spacing:0.5px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
.mono{ font-family:'DM Mono', monospace; }
:root{
  --elem-color:var(--brand-blue);
  --elem-tint:rgba(0,194,238,0.10);
  --mid-color:var(--brand-pink);
  --mid-tint:rgba(248,112,138,0.10);
}

.loading-overlay{
  position:fixed; inset:0; background:var(--bg); z-index:999;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
}
.loading-overlay.hidden{ display:none; }
.loading-spinner{
  width:38px; height:38px; border:4px solid rgba(36,27,46,0.15); border-top-color:var(--brand-pink);
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading-msg{ font-family:'Gugi',sans-serif; font-size:15px; color:var(--ink); text-align:center; padding:0 24px; }
.loading-error{ display:none; flex-direction:column; align-items:center; gap:14px; }
.loading-error.show{ display:flex; }
.loading-retry-btn{
  padding:10px 24px; border-radius:999px; border:none; background:var(--sun); color:var(--ink);
  font-weight:700; font-size:13.5px; cursor:pointer;
}
.loading-retry-btn:hover{ background:#FFD666; }

/* ===== Topbar ===== */
.topbar{
  position:relative; z-index:1;
  display:flex; align-items:center; gap:14px;
  padding:14px 28px; background:var(--ink);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-fox{ width:38px; height:38px; flex-shrink:0; border-radius:50%; object-fit:cover; border:2px solid var(--brand-pink); }
.brand-word{
  color:#fff; font-size:25px; font-family:'Gugi',sans-serif;
  font-weight:400; letter-spacing:1.5px;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
.brand-word b{ color:var(--sun); font-weight:400; }
.nav-chips{ display:flex; gap:8px; margin-left:24px; flex-wrap:wrap; }
.nav-chip{
  padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.55);
  border:1.5px solid transparent; cursor:default; white-space:nowrap;
}
.nav-chip.active{ background:var(--brand-pink); color:#fff; }

/* ===== Stage ===== */
.stage{ position:relative; z-index:1; max-width:720px; margin:0 auto; padding:36px 20px 80px; }

.eyebrow-row{ display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.eyebrow{
  font-family:'DM Mono',monospace; font-size:16px; font-weight:500; letter-spacing:0.5px;
  color:var(--ink-soft);
}
/* ===== Story Card ===== */
.story-card{
  background:var(--paper); border-radius:20px; padding:30px 26px 24px;
  border:2px solid var(--ink); position:relative;
  box-shadow:5px 5px 0 var(--brand-blue);
  margin-bottom:34px; overflow:hidden;
}
.story-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:8px;
  background:linear-gradient(90deg, var(--brand-blue), var(--brand-pink));
}
.story-title{ font-family:'Gugi',sans-serif; font-size:34px; letter-spacing:0.5px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.story-body{ font-size:16.5px; line-height:1.9; color:var(--ink); }
.story-body .given{
  display:block; margin:12px 0; padding:14px 16px; background:var(--ink);
  border-radius:10px; font-family:'DM Mono',monospace; font-size:14px; color:var(--sun);
  line-height:1.9;
}
.story-question{
  margin-top:14px; padding-top:14px; border-top:2px dotted var(--ring);
  font-weight:700; font-size:17px;
}

/* ===== Progress dots ===== */
.progress{ display:flex; align-items:center; gap:6px; margin-bottom:18px; padding-left:4px; }
.dot{
  width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:700;
  background:#fff; border:2px solid var(--ring); color:var(--ink-soft);
  transition:all .25s;
}
.dot.current{ border-color:var(--brand-pink); color:var(--brand-pink-deep); background:var(--mid-tint); }
.dot.done{ border-color:var(--mint); background:var(--mint); color:#fff; }
.dot-line{ flex:1; height:2px; background:var(--ring); }
.dot-line.done{ background:var(--mint); }

/* ===== Step Chain ===== */
.chain{ display:flex; flex-direction:column; gap:0; }
.step{
  display:none; animation:slideIn .35s ease both;
  margin-bottom:16px;
}
.step.visible{ display:block; }
@keyframes slideIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.step-row{ display:flex; gap:12px; align-items:flex-start; }
.fox-avatar{ width:54px; height:54px; flex-shrink:0; border-radius:50%; object-fit:cover; border:3px solid var(--brand-blue); box-shadow:0 2px 6px rgba(0,0,0,0.15); }
.bubble{
  flex:1; background:#FFFCF6; border:2px solid var(--ink);
  border-radius:4px 18px 18px 18px; padding:18px 20px;
  position:relative;
}
.bubble-q{ font-family:'Gugi',sans-serif; font-size:28px; letter-spacing:0.3px; margin-bottom:10px; line-height:1.3; }
.bubble-text{ font-size:16px; line-height:1.85; color:var(--ink); }
.hint-box{
  margin-top:12px; padding:13px 16px; border-radius:10px; font-size:14.5px; line-height:1.85;
}
.hint-box.elem{ background:var(--elem-color); }
.hint-box.mid{ background:var(--mid-color); }
.hint-tier{
  display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace;
  font-size:13px; font-weight:700; letter-spacing:0.3px;
  padding:5px 12px; border-radius:999px; margin-bottom:10px;
}
.hint-tier.elem{ background:var(--mint); color:#fff; }
.hint-tier.mid{ background:var(--sun); color:var(--ink); }
.hint-box-text{ color:#fff; font-size:14.5px; }

.scratch-wrap{ margin:14px 0 0 66px; width:calc(100% - 66px); position:relative; }
.scratch-canvas{
  display:block; width:100%; height:160px;
  background:repeating-linear-gradient(var(--paper),var(--paper) 27px, var(--border) 27px, var(--border) 28px);
  border:2px dashed var(--ring); border-radius:12px;
  touch-action:none; cursor:crosshair;
  overscroll-behavior:none;
}
.clear-btn{
  position:absolute; top:10px; right:10px; padding:5px 13px; border-radius:999px;
  border:none; background:rgba(36,27,46,0.08); color:var(--ink); font-size:11.5px; font-weight:700;
  cursor:pointer;
}
.clear-btn:hover{ background:rgba(36,27,46,0.16); }

.reveal-btn{
  margin:12px 0 0 66px;
  padding:9px 18px; border:none; border-radius:999px;
  background:var(--brand-pink); color:#fff; font-weight:700; font-size:13.5px;
  cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  transition:transform .12s, background .12s;
}
.reveal-btn:hover{ background:var(--brand-pink-deep); transform:translateY(-1px); }

.reveal-panel{
  display:none; margin:12px 0 0 66px;
  background:var(--brand-blue-deep); border:none;
  border-radius:12px; padding:16px 18px;
}
.reveal-panel.show{ display:block; animation:slideIn .3s ease both; }
.reveal-label{ font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; color:rgba(255,255,255,0.75); font-weight:700; margin-bottom:8px; }
.reveal-math{ display:flex; flex-direction:column; gap:14px; }
.eq-group{ display:flex; flex-direction:column; gap:5px; }
.eq-line{ font-family:'DM Mono',monospace; font-size:15.5px; line-height:1.7; color:#fff; }
.eq-final{
  font-family:'DM Mono',monospace; font-size:17px; font-weight:700; color:var(--sun);
  margin-top:4px; padding-top:10px; border-top:1.5px dashed rgba(255,255,255,0.4);
}

/* ===== Flow card ===== */
.flow-card{
  display:none; margin-top:30px; background:var(--ink); color:#fff;
  border-radius:20px; padding:24px 26px; position:relative; overflow:hidden;
}
.flow-card.show{ display:block; animation:slideIn .4s ease both; }
.flow-label-row{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.flow-avatar{ width:46px; height:46px; border-radius:50%; object-fit:cover; border:2.5px solid var(--sun); flex-shrink:0; }
.flow-label{
  font-family:'Gugi',sans-serif; font-size:26px; font-weight:400;
  letter-spacing:1.5px; color:var(--sun); margin-bottom:0;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
.hint-box-text p{ margin-bottom:8px; }
.hint-box-text p:last-child{ margin-bottom:0; }
.flow-line{ margin-bottom:10px; }
.flow-final{
  margin-top:6px; padding-top:12px; border-top:1.5px dashed rgba(255,255,255,0.3);
  font-weight:700; color:var(--sun); font-size:15.5px;
}
.flow-text{ font-size:15.5px; line-height:1.95; color:rgba(255,255,255,0.92); }
.flow-text strong{ color:var(--sun); }
.reset-btn{
  padding:10px 20px; border-radius:999px; border:none;
  background:var(--sun); color:var(--ink); font-size:13.5px; font-weight:700;
  cursor:pointer; transition:transform .12s;
}
.reset-btn:hover{ transform:translateY(-1px); background:#FFD666; }
.flow-actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
.flow-actions .back-btn{
  background:transparent; border:1.5px solid var(--sun); color:var(--sun);
}
.flow-actions .back-btn:hover{ background:rgba(255,201,60,0.12); transform:translateY(-1px); }

/* ===== Home screen: greeting & part navigation ===== */
.greeting{ font-size:16px; color:var(--ink-soft); margin-bottom:30px; line-height:1.7; }
.greeting b{ color:var(--ink); }
.part-block{ margin-bottom:42px; }
.part-header{
  display:flex; align-items:center; gap:12px;
  padding:16px 22px; border-radius:16px; margin-bottom:18px;
  cursor:pointer; transition:transform .12s;
}
.part-header:hover{ transform:translateY(-1px); }
.part-header.math1{ background:var(--brand-blue); }
.part-header.algebra{ background:var(--brand-pink); }
.part-icon{ font-size:28px; }
.part-title{ font-family:'Gugi',sans-serif; font-size:24px; color:#fff; letter-spacing:0.5px; -webkit-font-smoothing:antialiased; }
.part-sub{ margin-left:auto; font-family:'DM Mono',monospace; font-size:12px; color:rgba(255,255,255,0.85); }

.unit-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
@media (max-width:640px){ .unit-grid{ grid-template-columns:repeat(2, 1fr); } }

.unit-card{
  background:var(--ink); border:2px solid var(--ink); border-radius:14px;
  padding:16px; cursor:pointer; transition:transform .12s, box-shadow .12s;
  position:relative; min-height:120px; display:flex; flex-direction:column; justify-content:center;
}
.unit-card:hover{ transform:translateY(-2px); }
.unit-card.math1{ box-shadow:3px 3px 0 var(--brand-blue); }
.unit-card.algebra{ box-shadow:3px 3px 0 var(--brand-pink); }
.unit-card.placeholder{
  background:transparent; border-style:dashed; border-color:var(--ring); box-shadow:none; cursor:default; opacity:.6;
}
.unit-card.placeholder:hover{ transform:none; }
.unit-card.add-more{
  background:transparent; border-style:dashed; border-color:var(--brand-pink); box-shadow:none;
  display:flex; align-items:center; justify-content:center; color:var(--brand-pink-deep);
  font-weight:700; font-size:13px; min-height:64px;
}
.unit-ep{ font-family:'DM Mono',monospace; font-size:10.5px; color:rgba(255,255,255,0.55); letter-spacing:1px; margin-bottom:4px; }
.unit-name{ font-family:'Gugi',sans-serif; font-size:25px; font-weight:400; line-height:1.25; letter-spacing:0.3px; color:var(--sun); -webkit-font-smoothing:antialiased; }
.unit-card.placeholder .unit-name{ font-family:'Pretendard',sans-serif; font-size:14px; color:var(--ink-soft); font-weight:500; font-style:italic; }
.unit-card.placeholder .unit-ep{ color:var(--ink-soft); }
.unit-done-badge{
  position:absolute; top:-8px; right:-6px; background:var(--mint); color:#fff;
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; font-family:'DM Mono',monospace;
}

/* ===== Screen switching ===== */
.screen{ display:none; }
.screen.active{ display:block; }

/* ===== Breadcrumb / back nav ===== */
.crumb-wrap{ display:flex; align-items:center; gap:10px; margin-left:18px; }
.back-btn{
  display:flex; align-items:center; gap:5px; background:var(--sun); color:var(--ink);
  border:none; border-radius:999px; padding:8px 16px; font-size:13.5px; font-weight:700;
  cursor:pointer; font-family:'Pretendard',sans-serif; transition:transform .12s, background .12s;
}
.back-btn:hover{ background:#FFD666; transform:translateY(-1px); }
.crumb-text{ font-family:'DM Mono',monospace; font-size:12px; color:rgba(255,255,255,0.6); }
.crumb-text b{ color:#fff; font-weight:600; }

/* ===== Subunit / problem selector cards ===== */
.subunit-grid, .problem-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; margin-top:8px; }
@media (max-width:560px){ .subunit-grid, .problem-grid{ grid-template-columns:1fr; } }
.subunit-card, .problem-card{
  background:var(--paper); border:2px solid var(--ink); border-radius:16px;
  padding:20px; cursor:pointer; transition:transform .12s; box-shadow:3px 3px 0 var(--brand-pink);
}
.subunit-card:hover, .problem-card:hover{ transform:translateY(-2px); }
.subunit-card.placeholder, .problem-card.placeholder{
  background:transparent; border-style:dashed; border-color:var(--ring); box-shadow:none; cursor:default; opacity:.55;
}
.subunit-card.placeholder:hover, .problem-card.placeholder:hover{ transform:none; }
.card-name{ font-family:'Gugi',sans-serif; font-size:20px; color:var(--ink); -webkit-font-smoothing:antialiased; }
.subunit-card.placeholder .card-name, .problem-card.placeholder .card-name{ font-family:'Pretendard',sans-serif; font-size:14px; font-style:italic; color:var(--ink-soft); font-weight:500; }
.card-tag{
  display:inline-block; margin-bottom:8px; font-family:'DM Mono',monospace; font-size:10.5px;
  background:rgba(36,27,46,0.16); color:var(--ink); padding:2px 9px; border-radius:999px; font-weight:700;
}
/* 다채로운 컬러 순환 */
.subunit-card.c0, .problem-card.c0{ background:var(--brand-blue); box-shadow:3px 3px 0 var(--brand-blue-deep); }
.subunit-card.c1, .problem-card.c1{ background:var(--brand-pink); box-shadow:3px 3px 0 var(--brand-pink-deep); }
.subunit-card.c2, .problem-card.c2{ background:var(--mint); box-shadow:3px 3px 0 #05966F; }
.subunit-card.c3, .problem-card.c3{ background:var(--sun); box-shadow:3px 3px 0 #E8A800; }

</style>
</head>

<script>
/* ---------- Navigation data ---------- */
let math1Units = [];
let algebraUnits = [];
let subunitsByUnit = {};
let problemsBySubunit = {};
let unitNames = {};

/* ---------- Render home grids ---------- */
function renderUnitGrid(containerId, units, partClass){
  const el = document.getElementById(containerId);
  el.innerHTML = units.map(u => `
    <div class="unit-card ${partClass} ${u.known ? '' : 'placeholder'}" ${u.known ? `onclick="goToSubunits('${u.id}')"` : ''}>
      ${u.known ? '<div class="unit-done-badge">완성</div>' : ''}
      <div class="unit-ep">${u.ep}</div>
      <div class="unit-name">${u.name}</div>
    </div>
  `).join('') + (partClass === 'algebra' ? '<div class="unit-card add-more">+ 새 단원 추가 예정</div>' : '');
}

const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbw80cDK79L3N1xi9kgsiNpA61xygED7TPU17_hDShcXt8Cct_4CChMQ3-cOlVbTHuqDyg/exec';

async function loadAppData(){
  document.getElementById('loadingSpinner').style.display = '';
  document.getElementById('loadingMsg').style.display = '';
  document.getElementById('loadingError').classList.remove('show');
  try{
    const res = await fetch(SHEET_API_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    math1Units = data.math1Units || [];
    algebraUnits = data.algebraUnits || [];
    subunitsByUnit = data.subunitsByUnit || {};
    problemsBySubunit = data.problemsBySubunit || {};
    problemsData = data.problemsData || {};

    unitNames = {};
    math1Units.forEach(u => unitNames[u.id] = u.name);
    algebraUnits.forEach(u => unitNames[u.id] = u.name);

    renderUnitGrid('math1Grid', math1Units, 'math1');
    renderUnitGrid('algebraGrid', algebraUnits, 'algebra');

    document.getElementById('loadingOverlay').classList.add('hidden');
  }catch(err){
    console.error('데이터 로딩 실패:', err);
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('loadingError').classList.add('show');
  }
}
loadAppData();


/* ---------- Navigation state & logic ---------- */
let nav = { unit:null, subunit:null };
const screens = ['screen-home','screen-subunits','screen-problems','screen-detail'];

function showScreen(id){
  screens.forEach(s => document.getElementById(s).classList.toggle('active', s===id));
  document.getElementById('crumbWrap').style.display = (id==='screen-home') ? 'none' : 'flex';
  updateCrumb();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateCrumb(){
  let parts = ['공통수학1'];
  if(nav.unit) parts.push(unitNames[nav.unit]);
  if(nav.subunit) parts.push(subunitsByUnit[nav.unit].find(s=>s.id===nav.subunit).name);
  document.getElementById('crumbText').innerHTML = parts.map((p,i)=> i===parts.length-1 ? `<b>${p}</b>` : p).join(' / ');
}

function goToSubunits(unitId){
  nav.unit = unitId; nav.subunit = null;
  document.getElementById('subunitTitle').textContent = unitNames[unitId];
  const list = subunitsByUnit[unitId] || [];
  document.getElementById('subunitGrid').innerHTML = list.map((s,i) => `
    <div class="subunit-card ${s.known ? 'c'+(i%4) : 'placeholder'}" ${s.known ? `onclick="goToProblems('${s.id}')"` : ''}>
      ${s.known ? '<div class="card-tag">완성</div><div class="card-name hand">' + s.name + '</div>' : '<div class="card-name">' + s.name + '</div>'}
    </div>
  `).join('');
  showScreen('screen-subunits');
}

function goToProblems(subunitId){
  nav.subunit = subunitId;
  document.getElementById('problemTitle').textContent = subunitsByUnit[nav.unit].find(s=>s.id===subunitId).name;
  const list = problemsBySubunit[subunitId] || [];
  document.getElementById('problemGrid').innerHTML = list.map((p,i) => `
    <div class="problem-card ${p.known ? 'c'+(i%4) : 'placeholder'}" ${p.known ? `onclick="openProblem('${p.id}')"` : ''}>
      ${p.known ? '<div class="card-tag">완성</div><div class="card-name hand">' + p.name + '</div>' : '<div class="card-name">' + p.name + '</div>'}
    </div>
  `).join('');
  showScreen('screen-problems');
}

function goBack(){
  const current = screens.find(s => document.getElementById(s).classList.contains('active'));
  if(current === 'screen-detail') showScreen('screen-problems');
  else if(current === 'screen-problems') showScreen('screen-subunits');
  else if(current === 'screen-subunits') showScreen('screen-home');
}

const chain = document.getElementById('chain');
const progress = document.getElementById('progress');
let current = null;

function renderProgress(activeIdx){
  progress.innerHTML = current.steps.map((_,i)=>{
    let cls = i < activeIdx ? 'done' : (i===activeIdx ? 'current' : '');
    let content = i < activeIdx ? '✓' : (i+1);
    let lineCls = i < activeIdx ? 'done' : '';
    let line = i < current.steps.length-1 ? `<div class="dot-line ${lineCls}"></div>` : '';
    return `<div class="dot ${cls}">${content}</div>${line}`;
  }).join('');
}

function renderProblemDetail(id){
  current = problemsData[id];

  document.getElementById('detailEyebrow').textContent = current.eyebrow;
  document.getElementById('storyTitle').textContent = current.title;
  document.getElementById('storyBody').innerHTML = current.body;

  chain.innerHTML = '';
  current.steps.forEach((s, i)=>{
    const el = document.createElement('div');
    el.className = 'step';
    el.id = 'step'+i;
    const hintHtml = s.hint ? `
      <div class="hint-box ${s.hint.tier}">
        <span class="hint-tier ${s.hint.tier}">${s.hint.tier==='elem'?'🟢':'🟡'} ${s.hint.grade} · ${s.hint.label}</span>
        <div class="hint-box-text">${s.hint.text.map(t=>`<p>${t}</p>`).join('')}</div>
      </div>` : '';
    const groupsHtml = s.reveal.map(group =>
      `<div class="eq-group">${group.map(line => `<div class="eq-line">${line}</div>`).join('')}</div>`
    ).join('');
    const finalHtml = s.final ? `<div class="eq-final">${s.final}</div>` : '';
    el.innerHTML = `
      <div class="step-row">
        ${foxSvg}
        <div class="bubble">
          <div class="bubble-q hand">${s.q}</div>
          <div class="bubble-text">${s.text}</div>
          ${hintHtml}
        </div>
      </div>
      <div class="scratch-wrap">
        <canvas class="scratch-canvas" id="canvas${i}"></canvas>
        <button class="clear-btn" onclick="clearCanvas(${i})">지우기</button>
      </div>
      <button class="reveal-btn" onclick="revealStep(${i})">확인해보자 →</button>
      <div class="reveal-panel" id="reveal${i}">
        <div class="reveal-label">CHECK</div>
        <div class="reveal-math">${groupsHtml}${finalHtml}</div>
      </div>
    `;
    chain.appendChild(el);
  });

  document.getElementById('flowCard').classList.remove('show');
  document.getElementById('step0').classList.add('visible');
  setupCanvas(document.getElementById('canvas0'));
  renderProgress(0);
}

function setupCanvas(canvas){
  if(!canvas || canvas.dataset.ready) return;
  canvas.dataset.ready = '1';
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  const ctx = canvas.getContext('2d');
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#241B2E';

  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e){
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  canvas.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    canvas.setPointerCapture(e.pointerId);
  }, { passive: false });
  canvas.addEventListener('pointermove', (e)=>{
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }, { passive: false });
  const stopDraw = ()=>{ drawing = false; };
  canvas.addEventListener('pointerup', stopDraw);
  canvas.addEventListener('pointerleave', stopDraw);
  canvas.addEventListener('pointercancel', stopDraw);
}

function clearCanvas(i){
  const canvas = document.getElementById('canvas'+i);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}


function revealStep(i){
  document.getElementById('reveal'+i).classList.add('show');
  document.querySelector('#step'+i+' .reveal-btn').style.display = 'none';
  if(i+1 < current.steps.length){
    document.getElementById('step'+(i+1)).classList.add('visible');
    setupCanvas(document.getElementById('canvas'+(i+1)));
    renderProgress(i+1);
    setTimeout(()=>document.getElementById('step'+(i+1)).scrollIntoView({behavior:'smooth', block:'center'}), 100);
  } else {
    renderProgress(current.steps.length);
    document.getElementById('flowText').innerHTML =
      current.flowLines.map(l=>`<div class="flow-line">${l}</div>`).join('') +
      `<div class="flow-final">${current.flowFinal}</div>`;
    document.getElementById('flowCard').classList.add('show');
    setTimeout(()=>document.getElementById('flowCard').scrollIntoView({behavior:'smooth', block:'center'}), 100);
  }
}

function resetChain(){
  current.steps.forEach((s, i)=>{
    const stepEl = document.getElementById('step'+i);
    stepEl.classList.remove('visible');
    const canvas = stepEl.querySelector('.scratch-canvas');
    if(canvas && canvas.dataset.ready){
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    stepEl.querySelector('.reveal-btn').style.display = '';
    document.getElementById('reveal'+i).classList.remove('show');
  });
  document.getElementById('flowCard').classList.remove('show');
  document.getElementById('step0').classList.add('visible');
  renderProgress(0);
  document.querySelector('#screen-detail .story-card').scrollIntoView({behavior:'smooth', block:'start'});
}

function openProblem(id){
  showScreen('screen-detail');
  renderProblemDetail(id);
}

</script>
